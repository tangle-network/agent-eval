name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: clients/python/uv.lock

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck examples
        run: pnpm typecheck:examples

      - name: Test
        run: pnpm test

      - name: Build and emit OpenAPI
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm build

      - name: Verify packed package exports
        run: pnpm run verify:package

      - name: Install Python client
        working-directory: clients/python
        run: uv sync --frozen --extra dev --group skillopt-source --group gepa-source

      - name: Test Python client with official GEPA
        working-directory: clients/python
        run: uv run --frozen --extra dev --group skillopt-source --group gepa-source pytest -v

      - name: Test TypeScript official optimizer integrations
        env:
          AGENT_EVAL_TEST_PYTHON: ${{ github.workspace }}/clients/python/.venv/bin/python
        run: >-
          pnpm exec vitest run
          tests/campaign/gepa-official-integration.test.ts
          tests/campaign/skillopt-official-integration.test.ts

      - name: Install official DSPy
        working-directory: clients/python
        run: uv sync --frozen --extra dev --extra dspy

      - name: Test DSPy metric compatibility
        working-directory: clients/python
        run: uv run --frozen --extra dev --extra dspy pytest -v tests/test_dspy_metric.py

      - name: Verify publishable Python distributions
        working-directory: clients/python
        run: |
          pip install build twine
          python -m build
          twine check dist/*
          python scripts/verify_publishable_dist.py dist

  gepa-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: clients/python/uv.lock

      - run: pnpm install --frozen-lockfile

      - name: Install published GEPA
        working-directory: clients/python
        run: uv sync --frozen --extra dev --group gepa-release

      - name: Test published GEPA compatibility
        working-directory: clients/python
        env:
          AGENT_EVAL_EXPECT_GEPA_RELEASE: '1'
        run: >-
          uv run --frozen --extra dev --group gepa-release
          pytest -v
          tests/test_gepa_release_compatibility.py
          tests/test_gepa_bridge.py
          tests/test_official_optimizer_compatibility.py::test_agent_eval_gepa_bridge_resumes_state_from_a_real_prior_run

      - name: Test TypeScript bridge with published GEPA
        env:
          AGENT_EVAL_TEST_PYTHON: ${{ github.workspace }}/clients/python/.venv/bin/python
        run: pnpm exec vitest run tests/campaign/gepa-official-integration.test.ts
